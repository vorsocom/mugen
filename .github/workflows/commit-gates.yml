name: Commit Gates

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR Title
        if: ${{ github.event_name == 'pull_request' }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python3 scripts/check_conventional_commit.py --pr-title "$PR_TITLE"

      - name: Validate Commit Messages
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$PR_BASE_REF" == "main" && "$PR_HEAD_REF" == release/* ]]; then
              git fetch origin develop
              python3 scripts/check_conventional_commit.py \
                --from-ref "origin/develop" \
                --to-ref "$PR_HEAD_SHA"
              exit 0
            fi

            python3 scripts/check_conventional_commit.py \
              --from-ref "$PR_BASE_SHA" \
              --to-ref "$PR_HEAD_SHA"
            exit 0
          fi

          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            git fetch origin "$DEFAULT_BRANCH"
            python3 scripts/check_conventional_commit.py \
              --from-ref "origin/$DEFAULT_BRANCH" \
              --to-ref "$AFTER_SHA"
            exit 0
          fi

          python3 scripts/check_conventional_commit.py \
            --from-ref "$BEFORE_SHA" \
            --to-ref "$AFTER_SHA"
