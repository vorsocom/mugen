name: Test Gates

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  test-gates:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mugen
          POSTGRES_USER: mugen
          POSTGRES_PASSWORD: mugen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mugen -d mugen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Prepare Test Config
        run: |
          mkdir -p .tmp/ci
          poetry run python scripts/prepare_ci_config.py \
            --sample conf/mugen.toml.sample \
            --output mugen.toml \
            --keyval-db-path .tmp/ci/storage.db \
            --rdbms-url postgresql+psycopg://mugen:mugen@127.0.0.1:5432/mugen \
            --aws-region us-east-1
          poetry run python -m alembic upgrade head

      - name: Run Pre-Push Quality Gates
        env:
          ACP_E2E_STARTUP_TIMEOUT_SECS: "90"
        run: |
          gate_python="$(poetry run which python)"
          bash .codex/skills/prepush-quality-gates/scripts/run_prepush_quality_gates.sh \
            --python "$gate_python" \
            --update-coverage-badge

      - name: Ensure Coverage Badge Is Committed
        run: |
          if ! git diff --quiet -- README.md; then
            echo "README coverage badge is out of date in README.md." >&2
            echo "Run pre-push quality gates locally with --update-coverage-badge and commit README.md." >&2
            git --no-pager diff -- README.md
            exit 1
          fi
