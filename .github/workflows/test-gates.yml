name: Test Gates

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  test-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Prepare Test Config
        run: |
          cp conf/mugen.toml.sample mugen.toml
          mkdir -p .tmp/ci
          sed -i 's|^storage\.keyval\.dbm\.path = ".*"$|storage.keyval.dbm.path = ".tmp/ci/storage.db"|' mugen.toml
          sed -i 's|^api\.region = ""$|api.region = "us-east-1"|' mugen.toml

      - name: Run Pre-Push Quality Gates
        run: |
          gate_python="$(poetry run which python)"
          bash .codex/skills/prepush-quality-gates/scripts/run_prepush_quality_gates.sh \
            --python "$gate_python" \
            --update-coverage-badge

      - name: Ensure Coverage Badge Is Committed
        run: |
          if ! git diff --quiet -- README.md; then
            echo "README coverage badge is out of date in README.md." >&2
            echo "Run pre-push quality gates locally with --update-coverage-badge and commit README.md." >&2
            git --no-pager diff -- README.md
            exit 1
          fi
