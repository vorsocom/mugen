name: Test Gates

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  test-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Prepare Test Config
        run: |
          cp conf/mugen.toml.sample mugen.toml
          mkdir -p .tmp/ci
          sed -i 's|^storage\.keyval\.dbm\.path = ".*"$|storage.keyval.dbm.path = ".tmp/ci/storage.db"|' mugen.toml
          sed -i 's|^api\.region = ""$|api.region = "us-east-1"|' mugen.toml

      - name: Run Full Test Suite
        run: poetry run pytest mugen_test -q
