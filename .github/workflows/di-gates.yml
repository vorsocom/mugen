name: DI Gates

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  di-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install --no-interaction --no-root

      - name: Run DI Pytest Gate
        run: poetry run pytest mugen_test/test_mugen_di_*.py mugen_test/test_mugen_di_constructor_fallbacks.py

      - name: Run DI Unittest Gate
        run: poetry run python -m unittest mugen_test.test_mugen_register_extensions mugen_test.test_mugen_run_clients mugen_test.test_mugen_create_quart_app mugen_test.test_mugen_run_whatsapp_client
