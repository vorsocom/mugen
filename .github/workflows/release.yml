name: Release Automation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode to run"
        required: true
        type: choice
        options:
          - prepare
          - finish
      bump:
        description: "Semver bump for prepare mode (ignored if version is set)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Explicit release version (required for finish mode)"
        required: false
        type: string
      run_gates:
        description: "Run full pre-push quality gates during prepare mode"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install --with dev --no-interaction --no-root

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare Test Config
        if: ${{ inputs.mode == 'prepare' && inputs.run_gates }}
        run: |
          cp conf/mugen.toml.sample mugen.toml
          mkdir -p .tmp/ci
          sed -i 's|^storage\.keyval\.dbm\.path = ".*"$|storage.keyval.dbm.path = ".tmp/ci/storage.db"|' mugen.toml
          sed -i 's|^api\.region = ""$|api.region = "us-east-1"|' mugen.toml

      - name: Run Release Automation
        run: |
          set -euo pipefail

          release_python="$(poetry run which python)"

          if [[ "${{ inputs.mode }}" == "prepare" ]]; then
            cmd=(poetry run python scripts/release.py prepare --python "$release_python" --push)

            if [[ -n "${{ inputs.version }}" ]]; then
              cmd+=(--version "${{ inputs.version }}")
            else
              cmd+=(--bump "${{ inputs.bump }}")
            fi

            if [[ "${{ inputs.run_gates }}" != "true" ]]; then
              cmd+=(--skip-gates)
            fi

            "${cmd[@]}"
            exit 0
          fi

          if [[ "${{ inputs.mode }}" == "finish" ]]; then
            if [[ -z "${{ inputs.version }}" ]]; then
              echo "ERROR: version is required for finish mode." >&2
              exit 1
            fi

            poetry run python scripts/release.py finish --version "${{ inputs.version }}"
            exit 0
          fi

          echo "ERROR: unsupported mode '${{ inputs.mode }}'." >&2
          exit 1
